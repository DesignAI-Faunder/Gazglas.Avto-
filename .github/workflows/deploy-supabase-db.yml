name: Deploy Supabase DB Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-db.yml"
  workflow_dispatch:

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate required secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set in repository secrets."
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Apply database migrations
        run: |
          set -euo pipefail

          # Trim accidental whitespace/newlines when copying from notes apps.
          DATABASE_URL="$(printf %s "$DATABASE_URL" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No SQL migrations found in supabase/migrations/"
            exit 1
          fi

          # Apply in sorted filename order (timestamp prefixes recommended).
          IFS=$'\n' sorted="$(printf '%s\n' "${files[@]}" | sort)"
          while IFS= read -r sql_file; do
            echo "Applying migration: $sql_file"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$sql_file"
          done <<< "$sorted"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
